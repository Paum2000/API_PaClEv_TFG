services:
  db_sql:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=agenda_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api_sql:
    build: .
    container_name: paclev_api_sql
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db_sql
      - DB_TYPE=postgresql+psycopg2
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=agenda_db
      - DB_PORT=5432
    depends_on:
      - db_sql

volumes:
  postgres_data: